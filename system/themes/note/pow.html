{{ define "og" }}{{ end }}

{{ define "head" }}
<link rel="stylesheet" href="/assets/variable.css" />
<link rel="stylesheet" href="/assets/pow.css" />
<title>{{ __ "pow_title" }}</title>
{{ end }}

{{ define "content" }}
<div class="pow-wrapper" data-locale="{{ .Config.Locale }}">
  <p class="pow-tagline">{{ __ "pow_tagline" }}</p>

  <form id="pow-form" method="POST" action="/pow/solve">
    <input type="hidden" name="_csrf" value="{{ .CSRF }}" />
    <input type="hidden" name="redirect" value="{{ .PowRedirect }}" />
    <altcha-widget
      name="altcha"
      style="--altcha-max-width:100%"></altcha-widget>
  </form>
</div>

<script type="module" src="/assets/pow.js"></script>
{{ end }}
