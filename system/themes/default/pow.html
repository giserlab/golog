{{ define "og" }}{{ end }}

{{ define "head" }}
<link rel="stylesheet" href="/assets/variable.css" />
<link rel="stylesheet" href="/assets/pow.css" />
<script src="/assets/pow.js" defer></script>
<title>{{ __ "pow_title" }}</title>
{{ end }}

{{ define "content" }}
<div class="pow-wrapper" id="pow-wrapper" data-challenge="{{ .PowChallenge }}" data-difficulty="{{ .PowDifficulty }}">
  <div id="pow-start">
    <button class="pow-button" onclick="startPow()">
        <svg t="1781682731316" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="6204" width="400" height="400"><path d="M501.8 121.6h20.4v128h-20.4z" fill="#A0ABBD" p-id="6205"></path><path d="M512 873.5H226.5c-32.6 0-59.1-26.4-59.1-59.1V285.7c0-32.6 26.4-59.1 59.1-59.1H512v646.9z" fill="#6484BF" p-id="6206"></path><path d="M512 226.7h285.5c32.6 0 59.1 26.4 59.1 59.1v528.7c0 32.6-26.4 59.1-59.1 59.1H512V226.7z" fill="#4C6FAF" p-id="6207"></path><path d="M640.1 448.2m-59.1 0a59.1 59.1 0 1 0 118.2 0 59.1 59.1 0 1 0-118.2 0Z" fill="#FFFFFF" p-id="6208"></path><path d="M384.1 448.2m-59.1 0a59.1 59.1 0 1 0 118.2 0 59.1 59.1 0 1 0-118.2 0Z" fill="#FFFFFF" p-id="6209"></path><path d="M512 113.2m-49 0a49 49 0 1 0 98 0 49 49 0 1 0-98 0Z" fill="#A0ABBD" p-id="6210"></path><path d="M167.6 615.6l-54.4-27.2V458.1l54.4-29.2zM856.4 427.9l54.4 27.3v130.2l-54.4 29.2z" fill="#39507A" p-id="6211"></path></svg>
            {{ __ "pow_start" }}
    </button>
  </div>

  <div id="pow-verifying" class="pow-hidden">
    <button class="pow-button" disabled>
      <svg class="pow-spinner" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none" stroke-dasharray="32" stroke-linecap="round"/></svg>
      {{ __ "pow_status" }}
    </button>
  </div>

  <div id="pow-done" class="pow-hidden">
    <div class="pow-checkmark">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <p class="pow-success-text">{{ __ "pow_success" }}</p>
  </div>

  <p class="pow-error pow-hidden" id="pow-error"></p>

  <form id="pow-form" method="POST" action="/pow/solve" style="display:none">
    <input type="hidden" name="_csrf" value="{{ .CSRF }}" />
    <input type="hidden" name="challenge" value="{{ .PowChallenge }}" />
    <input type="hidden" name="nonce" id="nonce-input" />
    <input type="hidden" name="redirect" value="{{ .PowRedirect }}" />
  </form>
</div>

{{ end }}
