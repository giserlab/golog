<!DOCTYPE html>
<html class="is-secondary">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <link rel="stylesheet" href="/admin/assets/admin.css" />
        <script src="/admin/assets/admin.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&family=Noto+Sans+KR:wght@100..900&family=Noto+Sans+SC:wght@100..900&family=Noto+Sans+TC:wght@100..900&display=swap" rel="stylesheet">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        {{ if and .Config .Config.Favicon }}<link rel="icon" href="{{ .Config.Favicon }}" type="image/x-icon" />{{ else }}<link rel="icon" type="image/png" href="{{ .URL.RelativeRoot }}assets/favicon.ico">{{ end }}
        <title>{{ .Name }}</title>
        <style>
            body {
                font-family: "Noto Sans TC", "Noto Sans SC", "Noto Sans JP", "Noto Sans KR";
            }
        </style>
    </head>
    <body>
        <form method="POST">
            <input type="hidden" name="_csrf" value="{{ .CSRF }}" />
            <div class="ts-app-center">
                <div class="content">
                    <div class="ts-header is-large is-heavy is-icon">
                        <a href="/" target="_blank" title="{{ .Config.Name }}">
                        {{ if .Config.Favicon }}
                        <img src="{{ .Config.Favicon }}" style="width: 2em;" alt="{{ .Config.Name }}">
                        {{ else }}
                        <img src="/assets/favicon.ico" style="width: 2em;" alt="Golog">
                        {{ end }}
                        </a>
                    </div>
                    <div class="has-top-spaced-large" style="width: 100%">
                        {{ if .Message }}
                        <div class="ts-notice is-negative has-bottom-spaced">
                            <div class="content">{{ .Message }}</div>
                        </div>
                        {{ end }}
                        <div id="passkey-error" class="ts-notice is-negative has-bottom-spaced" style="display: none;">
                            <div class="content"></div>
                        </div>
                        <div class="ts-box">
                            <div class="ts-content is-padded">
                                <div class="ts-wrap is-vertical">
                                    <div class="ts-text is-label">{{ __ "users_email" }}</div>
                                    <div class="ts-input is-start-icon">
                                        <span class="ts-icon is-user-icon"></span>
                                        <input type="email" name="email" required />
                                    </div>
                                    <div class="ts-text is-label">{{ __ "users_password" }}</div>
                                    <div class="ts-input is-start-icon">
                                        <span class="ts-icon is-lock-icon"></span>
                                        <input type="password" name="password" required />
                                    </div>
                                    <div></div>
                                    <div class="ts-grid">
                                        <div class="column">
                                            <a href="{{ .URL.RelativeRoot }}" class="ts-button is-ghost">{{ __ "button_back" }}</a>
                                        </div>
                                        <div class="column is-fluid">
                                            <button type="submit" class="ts-button is-fluid">{{ __ "button_login" }}</button>
                                        </div>
                                    </div>
                                    <div class="ts-divider"></div>
                                    <button type="button" id="passkey-login-btn" class="ts-button is-fluid is-outlined">{{ __ "passkey_login" }}</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </form>
        <script>
        (function() {
            'use strict';

            function base64UrlToBuf(b64) {
                var str = b64.replace(/-/g, '+').replace(/_/g, '/');
                while (str.length % 4) str += '=';
                return Uint8Array.from(atob(str), function(c) { return c.charCodeAt(0); }).buffer;
            }

            function bufToBase64Url(buf) {
                var bytes = new Uint8Array(buf);
                var binary = '';
                for (var i = 0; i < bytes.length; i++) {
                    binary += String.fromCharCode(bytes[i]);
                }
                return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
            }

            function convertServerOptions(serverOpts) {
                var opts = JSON.parse(JSON.stringify(serverOpts.publicKey || serverOpts));
                opts.challenge = base64UrlToBuf(opts.challenge);
                if (opts.allowCredentials) {
                    opts.allowCredentials = opts.allowCredentials.map(function(c) {
                        return {
                            type: c.type,
                            id: base64UrlToBuf(c.id),
                            transports: c.transports || []
                        };
                    });
                }
                return opts;
            }

            function convertCredential(cred) {
                var resp = {};
                if (cred.response.clientDataJSON) {
                    resp.clientDataJSON = bufToBase64Url(cred.response.clientDataJSON);
                }
                if (cred.response.authenticatorData) {
                    resp.authenticatorData = bufToBase64Url(cred.response.authenticatorData);
                }
                if (cred.response.signature) {
                    resp.signature = bufToBase64Url(cred.response.signature);
                }
                if (cred.response.userHandle) {
                    resp.userHandle = bufToBase64Url(cred.response.userHandle);
                }
                if (cred.response.attestationObject) {
                    resp.attestationObject = bufToBase64Url(cred.response.attestationObject);
                }
                return {
                    id: cred.id,
                    rawId: bufToBase64Url(cred.rawId),
                    type: cred.type,
                    response: resp,
                    clientExtensionResults: cred.clientExtensionResults || {}
                };
            }

            var btn = document.getElementById('passkey-login-btn');
            if (!btn) return;

            var MESSAGES = {
                generic: "{{ __ "passkey_error_generic" }}",
                cancelled: "{{ __ "passkey_error_cancelled" }}",
                unsupported: "{{ __ "passkey_error_unsupported" }}",
                config: "{{ __ "passkey_error_config" }}"
            };

            var errorBox = document.getElementById('passkey-error');

            function showError(text) {
                if (!errorBox) {
                    alert(text);
                    return;
                }
                var content = errorBox.querySelector('.content');
                if (content) content.textContent = text;
                errorBox.style.display = '';
            }

            function hideError() {
                if (errorBox) errorBox.style.display = 'none';
            }

            // Map a WebAuthn / fetch failure to a user-friendly message.
            function friendlyMessage(err) {
                var name = err && err.name ? err.name : '';
                var msg = (err && err.message ? err.message : '').toLowerCase();
                if (name === 'SecurityError' || msg.indexOf('registrable domain') !== -1 || msg.indexOf('relying party') !== -1) {
                    return MESSAGES.config;
                }
                if (name === 'NotSupportedError') {
                    return MESSAGES.unsupported;
                }
                if (name === 'NotAllowedError' || name === 'AbortError') {
                    return MESSAGES.cancelled;
                }
                return MESSAGES.generic;
            }

            btn.addEventListener('click', function() {
                hideError();

                if (!window.PublicKeyCredential || !navigator.credentials || !navigator.credentials.get) {
                    showError(MESSAGES.unsupported);
                    return;
                }

                var csrf = document.querySelector('input[name="_csrf"]');
                var csrfToken = csrf ? csrf.value : '';

                fetch('/login/passkey/begin', {
                    method: 'POST',
                    headers: {
                        'X-CSRF-Token': csrfToken,
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                })
                .then(function(r) { return r.json(); })
                .then(function(options) {
                    if (options.error) throw new Error(options.error);
                    var challenge = options.challenge;
                    return navigator.credentials.get({ publicKey: convertServerOptions(options) }).then(function(assertion) {
                        return { assertion: assertion, challenge: challenge };
                    });
                })
                .then(function(data) {
                    var body = JSON.stringify(convertCredential(data.assertion));
                    return fetch('/login/passkey/finish?challenge=' + encodeURIComponent(data.challenge), {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRF-Token': csrfToken,
                            'X-Requested-With': 'XMLHttpRequest'
                        },
                        body: body
                    });
                })
                .then(function(r) { return r.json(); })
                .then(function(result) {
                    if (result.error) throw new Error(result.error);
                    if (result.redirect) window.location.href = result.redirect;
                })
                .catch(function(err) {
                    console.error('Passkey login failed:', err);
                    showError(friendlyMessage(err));
                });
            });
        })();
        </script>
    </body>
</html>
