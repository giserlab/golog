name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - run: make build

      - name: Package binaries
        run: |
          cd bin
          for dir in */; do
            tar czf "${dir%/}.tar.gz" "$dir"
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: bin/*.tar.gz
          generate_release_notes: true
