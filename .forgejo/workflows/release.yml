name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - run: make build

      - name: Package binaries
        run: |
          cd bin
          for dir in */; do
            tar czf "${dir%/}.tar.gz" "$dir"
          done

      - uses: https://code.forgejo.org/forgejo/forgejo-release@v2
        with:
          direction: upload
          release-dir: bin/
          token: ${{ secrets.FORGEJO_TOKEN }}
